        <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャラ獲得数カウンター付きガチャゲーム</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding-top: 20px;
        }
        .container {
            background-color: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .button-area { margin: 15px 0; }
        button {
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            margin: 5px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #999;
        }
        button:active {
            box-shadow: 0 0 #999;
            transform: translateY(4px);
        }
        .btn-single { background-color: #ff4757; }
        .btn-multi { background-color: #1e90ff; }
        .btn-bgm { background-color: #2ed573; font-size: 12px; padding: 5px 10px; box-shadow: 0 2px #26af5f; }

        .counter-area {
            background-color: #f1f2f6;
            padding: 10px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #2f3542;
            margin: 15px 0;
            display: inline-block;
            padding: 10px 30px;
        }
        #total-count { color: #ff4757; font-size: 24px; }

        #result-area {
            margin-top: 20px;
            min-height: 50px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .char-card {
            background: #fafafa;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            width: 100px;
            font-size: 14px;
            animation: popIn 0.3s ease-out;
        }
        .rarity-ssr { border-color: #ffa500; background: #fffde6; color: #ffa500; font-weight: bold;}
        .rarity-sr { border-color: #9b59b6; background: #fbf3ff; color: #9b59b6; font-weight: bold;}
        .rarity-r { border-color: #555; color: #555; }
        
        .char-img { width: 70px; height: 70px; object-fit: contain; margin: 5px 0; }

        /* コレクション（図鑑）エリア */
        .collection-area { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #ccc; }
        .zukan-container { display: flex; justify-content: space-around; margin-top: 15px; }
        .zukan-item { font-size: 14px; color: #ccc; transition: all 0.5s; }
        .zukan-item.owned { color: #333; font-weight: bold; }
        
        .zukan-img { width: 60px; height: 60px; object-fit: contain; filter: grayscale(100%); opacity: 0.4; }
        .zukan-item.owned .zukan-img { filter: grayscale(0%); opacity: 1; }

        /* ーーー 🌟追加：図鑑の「個数カウント」用の文字デザイン ーーー */
        .zukan-count {
            font-size: 12px;
            color: #747d8c;
            background-color: #e4e7eb;
            border-radius: 10px;
            padding: 2px 5px;
            display: inline-block;
            margin-top: 3px;
        }
        .zukan-item.owned .zukan-count {
            color: white;
            background-color: #ffa500; /* ゲットしたらオレンジ色に */
        }

        #cutin-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .cutin-char-img { width: 80%; max-width: 350px; object-fit: contain; animation: slideInAndShake 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .cutin-text { color: #ffa500; font-size: 36px; font-weight: bold; text-shadow: 0 0 10px #fff, 0 0 20px #ffa500; margin-top: 20px; animation: pulseText 1s infinite alternate; }
        .flash-effect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; animation: flash 0.4s ease-out; }

        @keyframes slideInAndShake { 0% { transform: translateX(100%) scale(0.8); opacity: 0; } 70% { transform: translateX(-5%) scale(1.05); opacity: 1; } 100% { transform: translateX(0) scale(1); } }
        @keyframes pulseText { 0% { transform: scale(0.9); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .loading-text { font-size: 28px; color: #ff4757; width: 100%; }
    </style>
</head>
<body>

    <div id="cutin-screen" onclick="closeCutin()">
        <div class="flash-effect"></div>
        <img id="cutin-image" src="" class="cutin-char-img">
        <div class="cutin-text">✨SSR降臨✨</div>
        <p style="color: white; font-size: 12px; margin-top: 30px;">画面をタップして閉じる</p>
    </div>

    <div class="container">
        <h1>個数カウント付きガチャ</h1>
        <p>SSR: 3% / SR: 18% / R: 79%</p>
        
        <div>
            <button class="btn-bgm" onclick="toggleBGM()">🎵 BGM 再生 / 停止</button>
        </div>

        <div class="counter-area">
            累計ガチャ回数: <span id="total-count">0</span> 回
        </div>
        
        <div class="button-area">
            <button class="btn-single" onclick="startGacha(1)">1回ガチャ</button>
            <button class="btn-multi" onclick="startGacha(10)">🔥10連ガチャ</button>
        </div>
        
        <div id="result-area">結果はここにでるよ</div>

        <div class="collection-area">
            <h3>📜 キャラクター図鑑 📜</h3>
            <div class="zukan-container">
                <div class="zukan-item" id="zukan-dragon">
                    <img src="1781121909523.png" class="zukan-img">
                    <div>SSR</div>
                    <div class="zukan-count">× <span id="count-dragon">0</span></div>
                </div>
                <div class="zukan-item" id="zukan-cat">
                    <img src="1781122399877.png" class="zukan-img">
                    <div>SR</div>
                    <div class="zukan-count">× <span id="count-cat">0</span></div>
                </div>
                <div class="zukan-item" id="zukan-slime">
                    <img src="1781122784240.png" class="zukan-img">
                    <div>R</div>
                    <div class="zukan-count">× <span id="count-cat-slime">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ーーー 🌟変更：ただの「持ってる（true/false）」から「何体（数字）」の記録に変える ーーー
        let collectionCounters = {
            dragon: 0,
            cat: 0,
            slime: 0
        };

        let hasSsrInThisGacha = false;
        let totalGachaCount = 0;

        let seClick = new Audio('Koukaonn.mp3');
        let seFanfare = new Audio('Kakuhenn.mp3');
        let bgm = new Audio('Wanikann.mp3');
        bgm.loop = true; 
        let isBgmPlaying = false;

        function toggleBGM() {
            if (isBgmPlaying) { bgm.pause(); isBgmPlaying = false; } else { bgm.play(); isBgmPlaying = true; }
        }

        function startGacha(count) {
            seClick.currentTime = 0; seClick.play();
            if (!isBgmPlaying) { bgm.play(); isBgmPlaying = true; }

            totalGachaCount = totalGachaCount + count;
            document.getElementById("total-count").innerText = totalGachaCount;

            let resultArea = document.getElementById("result-area");
            resultArea.innerHTML = "<div class='loading-text'>⏳ 召喚中...</div>";
            hasSsrInThisGacha = false; 
            
            setTimeout(() => {
                resultArea.innerHTML = ""; 
                for (let i = 0; i < count; i++) {
                    let isTenjo = (count === 10 && i === 9);
                    let cardHtml = pullOneGacha(isTenjo);
                    resultArea.innerHTML += cardHtml;
                }
                // ガチャ結果が出たあとに、図鑑の文字（個数）を更新する
                updateZukanDisplay();

                if (hasSsrInThisGacha) { triggerCutin("sketch-1781131048995.png"); }
            }, 800);
        }

        function pullOneGacha(isTenjo) {
            let randomNumber = Math.floor(Math.random() * 100) + 1;
            let rarityClass, rarityText, charIcon, charName;

            if (isTenjo) {
                if (randomNumber <= 3) { randomNumber = 1; } else { randomNumber = 10; }
            }

            if (randomNumber <= 3) {
                rarityClass = "rarity-ssr"; rarityText = "✨SSR✨"; 
                charIcon = "<img src='1781121909523.png' class='char-img'>"; charName = "いついよ";
                
                // 🌟追加：ドラゴンのカウントを＋1する
                collectionCounters.dragon = collectionCounters.dragon + 1;
                hasSsrInThisGacha = true; 
            } else if (randomNumber <= 21) {
                rarityClass = "rarity-sr"; rarityText = "⭐SR⭐"; 
                charIcon = "<img src='1781122399877.png' class='char-img'>"; charName = "ガチホモ";
                
                // 🌟追加：ネコのカウントを＋1する
                collectionCounters.cat = collectionCounters.cat + 1;
            } else {
                rarityClass = "rarity-r"; rarityText = "R"; 
                charIcon = "<img src='1781122784240.png' class='char-img'>"; charName = "犬もんたん";
                
                // 🌟追加：スライムのカウントを＋1する
                collectionCounters.slime = collectionCounters.slime + 1;
            }

            return `
                <div class="char-card ${rarityClass}">
                    <div>${rarityText}</div>
                    <div>${charIcon}</div>
                    <div style="font-size: 11px;">${charName}</div>
                    ${isTenjo ? "<div style='font-size:9px; background:#e1f5fe; color:#0288d1; border-radius:3px;'>確定枠</div>" : ""}
                </div>
            `;
        }

        function triggerCutin(imagePath) {
            bgm.volume = 0.3; seFanfare.currentTime = 0; seFanfare.play(); 
            let cutinScreen = document.getElementById("cutin-screen");
            let cutinImage = document.getElementById("cutin-image");
            cutinImage.src = imagePath; cutinScreen.style.display = "flex"; 
        }

        function closeCutin() {
            document.getElementById("cutin-screen").style.display = "none"; bgm.volume = 1.0;
        }

        // ーーー 🌟変更：図鑑の表示と、個数の数字を書き換える処理 ーーー
        function updateZukanDisplay() {
            // ドラゴンの処理
            if (collectionCounters.dragon > 0) {
                document.getElementById("zukan-dragon").classList.add("owned");
                document.getElementById("count-dragon").innerText = collectionCounters.dragon;
            }
            // ネコの処理
            if (collectionCounters.cat > 0) {
                document.getElementById("zukan-cat").classList.add("owned");
                document.getElementById("count-cat").innerText = collectionCounters.cat;
            }
            // スライムの処理
            if (collectionCounters.slime > 0) {
                document.getElementById("zukan-slime").classList.add("owned");
                document.getElementById("count-cat-slime").innerText = collectionCounters.slime;
            }
        }
    </script>

</body>
</html>
