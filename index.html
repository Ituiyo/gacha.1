<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天井＆図鑑付きガチャゲーム</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding-top: 20px;
        }
        .container {
            background-color: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .button-area { margin: 20px 0; }
        button {
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            margin: 5px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #999;
        }
        button:active {
            box-shadow: 0 0 #999;
            transform: translateY(4px);
        }
        .btn-single { background-color: #ff4757; }
        .btn-multi { background-color: #1e90ff; }

        /* ガチャ結果エリア */
        #result-area {
            margin-top: 20px;
            min-height: 50px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .char-card {
            background: #fafafa;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            width: 100px;
            font-size: 14px;
            animation: popIn 0.3s ease-out;
        }
        .rarity-ssr { border-color: #ffa500; background: #fffde6; color: #ffa500; font-weight: bold;}
        .rarity-sr { border-color: #9b59b6; background: #fbf3ff; color: #9b59b6; font-weight: bold;}
        .rarity-r { border-color: #555; color: #555; }
        .char-icon { font-size: 36px; margin: 5px 0; }

        /* ーーー 新設：コレクション（図鑑）エリア ーーー */
        .collection-area {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #ccc;
        }
        .zukan-container {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        .zukan-item {
            font-size: 14px;
            color: #ccc; /* 未所持の時はグレーアウト */
            transition: all 0.5s;
        }
        /* キャラをゲットした時に適用するクラス */
        .zukan-item.owned {
            color: #333;
            font-weight: bold;
            transform: scale(1.1);
        }
        .zukan-icon { font-size: 40px; filter: grayscale(100%); }
        .zukan-item.owned .zukan-icon { filter: grayscale(0%); } /* ゲットしたらカラーに */

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .loading-text { font-size: 28px; color: #ff4757; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h1>天井＆図鑑付きガチャ</h1>
        <p>SSR: 3% / SR: 18% / R: 79%<br><small style="color: #1e90ff;">※10連ガチャの最後はSR以上確定！</small></p>
        
        <div class="button-area">
            <button class="btn-single" onclick="startGacha(1)">1回ガチャ</button>
            <button class="btn-multi" onclick="startGacha(10)">🔥10連ガチャ</button>
        </div>
        
        <div id="result-area">結果はここにでるよ</div>

        <div class="collection-area">
            <h3>📜 キャラクター図鑑 📜</h3>
            <div class="zukan-container">
                <div class="zukan-item" id="zukan-dragon">
                    <div class="zukan-icon">︎︎■</div>
                    <div>SSR</div>
                </div>
                <div class="zukan-item" id="zukan-cat">
                    <div class="zukan-icon">︎◆</div>
                    <div>SR</div>
                </div>
                <div class="zukan-item" id="zukan-slime">
                    <div class="zukan-icon">︎▲</div>
                    <div>R</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 図鑑の所持状況を記録するデータ（最初は全部false＝未所持）
        let collection = {
            dragon: false,
            cat: false,
            slime: false
        };

        function startGacha(count) {
            let resultArea = document.getElementById("result-area");
            resultArea.innerHTML = "<div class='loading-text'>⏳ カットイン中...</div>";
            
            setTimeout(() => {
                resultArea.innerHTML = ""; 
                
                for (let i = 0; i < count; i++) {
                    // 10連ガチャの「10回目（iが9のとき）」だけ、天井フラグをtrueにする
                    let isTenjo = (count === 10 && i === 9);
                    
                    let cardHtml = pullOneGacha(isTenjo);
                    resultArea.innerHTML += cardHtml;
                }
                
                // ガチャが終わったら図鑑の表示を更新する
                updateZukanDisplay();
            }, 800);
        }

        // 1回分のガチャ計算（天井フラグを受け取る）
        function pullOneGacha(isTenjo) {
            let randomNumber = Math.floor(Math.random() * 100) + 1;
            
            let rarityClass, rarityText, charIcon, charName;

            // 天井（SR以上確定）の場合の確率処理
            if (isTenjo) {
                // 天井の時はRが出ない。例えば「SSRは15%、SRは85%」にする
                if (randomNumber <= 3) {
                    randomNumber = 1; // 強制的にSSRの範囲にする
                } else {
                    randomNumber = 10; // 強制的にSRの範囲にする
                }
            }

            // 通常の確率判定
            if (randomNumber <= 3) {
                rarityClass = "rarity-ssr"; rarityText = "✨SSR✨"; charIcon = "︎🌟︎🌟︎🌟"; charName = "SSR";
                collection.dragon = true; // 図鑑データを「所持」にする
            } else if (randomNumber <= 21) {
                rarityClass = "rarity-sr"; rarityText = "⭐SR⭐"; charIcon = "︎︎🌟︎🌟"; charName = "SR";
                collection.cat = true;
            } else {
                rarityClass = "rarity-r"; rarityText = "R"; charIcon = "︎🌟"; charName = "R";
                collection.slime = true;
            }

            return `
                <div class="char-card ${rarityClass}">
                    <div>${rarityText}</div>
                    <div class="char-icon">${charIcon}</div>
                    <div style="font-size: 11px;">${charName}</div>
                    ${isTenjo ? "<div style='font-size:9px; background:#e1f5fe; color:#0288d1; border-radius:3px;'>確定枠</div>" : ""}
                </div>
            `;
        }

        // 図鑑の見た目を最新の状態に書き換える関数
        function updateZukanDisplay() {
            if (collection.dragon) document.getElementById("zukan-dragon").classList.add("owned");
            if (collection.cat) document.getElementById("zukan-cat").classList.add("owned");
            if (collection.slime) document.getElementById("zukan-slime").classList.add("owned");
        }
    </script>

</body>
</html>
