<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音付き！フル演出ガチャゲーム</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding-top: 20px;
        }
        .container {
            background-color: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .button-area { margin: 20px 0; }
        button {
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            margin: 5px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #999;
        }
        button:active {
            box-shadow: 0 0 #999;
            transform: translateY(4px);
        }
        .btn-single { background-color: #ff4757; }
        .btn-multi { background-color: #1e90ff; }
        
        /* ーーー ★追加：BGM切り替え用のボタン ーーー */
        .btn-bgm {
            background-color: #2ed573;
            font-size: 12px;
            padding: 5px 10px;
            box-shadow: 0 2px #26af5f;
        }

        #result-area {
            margin-top: 20px;
            min-height: 50px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .char-card {
            background: #fafafa;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            width: 100px;
            font-size: 14px;
            animation: popIn 0.3s ease-out;
        }
        .rarity-ssr { border-color: #ffa500; background: #fffde6; color: #ffa500; font-weight: bold;}
        .rarity-sr { border-color: #9b59b6; background: #fbf3ff; color: #9b59b6; font-weight: bold;}
        .rarity-r { border-color: #555; color: #555; }
        
        .char-img { width: 70px; height: 70px; object-fit: contain; margin: 5px 0; }

        .collection-area { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #ccc; }
        .zukan-container { display: flex; justify-content: space-around; margin-top: 15px; }
        .zukan-item { font-size: 14px; color: #ccc; transition: all 0.5s; }
        .zukan-item.owned { color: #333; font-weight: bold; }
        
        .zukan-img {
            width: 60px; height: 60px; object-fit: contain;
            filter: grayscale(100%); opacity: 0.4;
        }
        .zukan-item.owned .zukan-img { filter: grayscale(0%); opacity: 1; }

        #cutin-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .cutin-char-img {
            width: 80%; max-width: 350px; object-fit: contain;
            animation: slideInAndShake 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .cutin-text {
            color: #ffa500; font-size: 36px; font-weight: bold;
            text-shadow: 0 0 10px #fff, 0 0 20px #ffa500; margin-top: 20px;
            animation: pulseText 1s infinite alternate;
        }
        .flash-effect {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none;
            animation: flash 0.4s ease-out;
        }

        @keyframes slideInAndShake {
            0% { transform: translateX(100%) scale(0.8); opacity: 0; }
            70% { transform: translateX(-5%) scale(1.05); opacity: 1; }
            100% { transform: translateX(0) scale(1); }
        }
        @keyframes pulseText { 0% { transform: scale(0.9); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .loading-text { font-size: 28px; color: #ff4757; width: 100%; }
    </style>
</head>
<body>

    <div id="cutin-screen" onclick="closeCutin()">
        <div class="flash-effect"></div>
        <img id="cutin-image" src="" class="cutin-char-img">
        <div class="cutin-text">✨SSR降臨✨</div>
        <p style="color: white; font-size: 12px; margin-top: 30px;">画面をタップして閉じる</p>
    </div>

    <div class="container">
        <h1>音付き豪華ガチャ</h1>
        <p>SSR: 3% / SR: 18% / R: 79%</p>
        
        <div>
            <button class="btn-bgm" onclick="toggleBGM()">🎵 BGM 再生 / 停止</button>
        </div>
        
        <div class="button-area">
            <button class="btn-single" onclick="startGacha(1)">1回ガチャ</button>
            <button class="btn-multi" onclick="startGacha(10)">🔥10連ガチャ</button>
        </div>
        
        <div id="result-area">結果はここにでるよ</div>

        <div class="collection-area">
            <h3>📜 キャラクター図鑑 📜</h3>
            <div class="zukan-container">
                <div class="zukan-item" id="zukan-dragon">
                    <img src="1781121909523.png" class="zukan-img">
                    <div>SSR</div>
                </div>
                <div class="zukan-item" id="zukan-cat">
                    <img src="1781122399877.png" class="zukan-img">
                    <div>SR</div>
                </div>
                <div class="zukan-item" id="zukan-slime">
                    <img src="1781122784240.png" class="zukan-img">
                    <div>R</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let collection = { dragon: false, cat: false, slime: false };
        let hasSsrInThisGacha = false;

        // ーーー 🌟ここから追加：オーディオ（音）の設定 ーーー
        let seClick = new Audio('効果音1.mp3');
        let seFanfare = new Audio('');
        let bgm = new Audio('わにかん.mp3');
        
        bgm.loop = true; // BGMをループ再生（ずっと繰り返す）に設定
        let isBgmPlaying = false;

        // BGMを鳴らしたり止めたりする関数
        function toggleBGM() {
            if (isBgmPlaying) {
                bgm.pause();
                isBgmPlaying = false;
            } else {
                bgm.play();
                isBgmPlaying = true;
            }
        }

        function startGacha(count) {
            // 🌟ボタンを押した瞬間に効果音を鳴らす！
            seClick.currentTime = 0; // 音を最初から再生するためのリセット
            seClick.play();

            // もしBGMボタンを押していなくても、ガチャボタンを押した時に自動でBGMをスタートさせる（スマホの音鳴らせる制限対策）
            if (!isBgmPlaying) {
                bgm.play();
                isBgmPlaying = true;
            }

            let resultArea = document.getElementById("result-area");
            resultArea.innerHTML = "<div class='loading-text'>⏳ 召喚中...</div>";
            hasSsrInThisGacha = false; 
            
            setTimeout(() => {
                resultArea.innerHTML = ""; 
                for (let i = 0; i < count; i++) {
                    let isTenjo = (count === 10 && i === 9);
                    let cardHtml = pullOneGacha(isTenjo);
                    resultArea.innerHTML += cardHtml;
                }
                updateZukanDisplay();

                if (hasSsrInThisGacha) {
                    triggerCutin("1781121909523.png");
                }
            }, 800);
        }

        function pullOneGacha(isTenjo) {
            let randomNumber = Math.floor(Math.random() * 100) + 1;
            let rarityClass, rarityText, charIcon, charName;

            if (isTenjo) {
                if (randomNumber <= 15) { randomNumber = 1; } else { randomNumber = 10; }
            }

            if (randomNumber <= 3) {
                rarityClass = "rarity-ssr"; rarityText = "✨SSR✨"; 
                charIcon = "<img src='1781121909523.png' class='char-img'>"; charName = "ゴッドドラゴン";
                collection.dragon = true;
                hasSsrInThisGacha = true; 
            } else if (randomNumber <= 21) {
                rarityClass = "rarity-sr"; rarityText = "⭐SR⭐"; 
                charIcon = "<img src='1781122399877.png' class='char-img'>"; charName = "魔導師ネコ";
                collection.cat = true;
            } else {
                rarityClass = "rarity-r"; rarityText = "R"; 
                charIcon = "<img src='1781122784240.png' class='char-img'>"; charName = "スライム";
                collection.slime = true;
            }

            return `
                <div class="char-card ${rarityClass}">
                    <div>${rarityText}</div>
                    <div>${charIcon}</div>
                    <div style="font-size: 11px;">${charName}</div>
                    ${isTenjo ? "<div style='font-size:9px; background:#e1f5fe; color:#0288d1; border-radius:3px;'>確定枠</div>" : ""}
                </div>
            `;
        }

        function triggerCutin(imagePath) {
            // 🌟SSRが出たら、BGMを少し小さくしてファンファーレを目立たせる
            bgm.volume = 0.3; 
            seFanfare.currentTime = 0;
            seFanfare.play(); // ファンファーレを鳴らす！

            let cutinScreen = document.getElementById("cutin-screen");
            let cutinImage = document.getElementById("cutin-image");
            cutinImage.src = imagePath; 
            cutinScreen.style.display = "flex"; 
        }

        function closeCutin() {
            document.getElementById("cutin-screen").style.display = "none";
            // 🌟カットインを閉じたら、BGMの音量を元に戻す
            bgm.volume = 1.0;
        }

        function updateZukanDisplay() {
            if (collection.dragon) document.getElementById("zukan-dragon").classList.add("owned");
            if (collection.cat) document.getElementById("zukan-cat").classList.add("owned");
            if (collection.slime) document.getElementById("zukan-slime").classList.add("owned");
        }
    </script>

</body>
</html>
