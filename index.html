<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>確定演出搭載ガチャゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="kakutei-screen" onclick="closeKakuteiAndStart()">
        <div class="rainbow-flash"></div>
        <div class="kakutei-main-text">⚠️ WARNING ⚠️</div>
        <div class="kakutei-sub-text">✨コンビニにいきたくなってきたな…✨<br>SSR確定！！</div>
        <p style="color: #fff; font-size: 14px; margin-top: 40px; opacity: 0.7;">画面をタップして召喚を開始する</p>
    </div>

    <div id="gacha-animation-screen" onclick="showNextCard()">
        <div class="animation-container">
            <button id="skip-btn" onclick="skipAnimation(event)">⏩ スキップ</button>
            
            <div id="big-char-card" class="char-card">
                <div id="big-rarity"></div>
                <div><img id="big-img" src="" class="char-img"></div>
                <div id="big-name" style="font-size: 18px; margin-top: 10px;"></div>
                <div id="big-tenjo" style="display:none; font-size:12px; background:#e1f5fe; color:#0288d1; border-radius:3px; margin-top:5px;">確定枠</div>
            </div>
            <p style="color: white; font-size: 14px; margin-top: 20px;">画面をタップして次へ</p>
        </div>
    </div>

    <div id="cutin-screen" onclick="closeCutin()">
        <div class="flash-effect"></div>
        <img id="cutin-image" src="" class="cutin-char-img">
        <div class="cutin-text">✨SSR降臨✨</div>
        <p style="color: white; font-size: 12px; margin-top: 30px;">画面をタップして閉じる</p>
    </div>

    <div class="container">
        
        <div class="menu-tabs">
            <button class="tab-btn active" onclick="switchPage('gacha-page', this)">🔮 ガチャを引く</button>
            <button class="tab-btn" onclick="switchPage('zukan-page', this)">📜 図鑑を見る</button>
        </div>
        
        <div>
            <button class="btn-bgm" onclick="toggleBGM()">🎵 BGM 再生 / 停止</button>
        </div>

        <div id="gacha-page" class="page-area active">
            <h2>プレミアムガチャ</h2>
            <div class="counter-area">
                累計ガチャ回数: <span id="total-count">0</span> 回
            </div>
            
            <div class="button-area">
                <button class="btn-single" onclick="startGacha(1)">1回ガチャ</button>
                <button class="btn-multi" onclick="startGacha(10)">🔥10連ガチャ</button>
            </div>
            
            <div id="result-area">結果はここにでるよ</div>
        </div>

        <div id="zukan-page" class="page-area">
            <div class="collection-area">
                <h2>📜 キャラクター図鑑 📜</h2>
                <div class="zukan-container" id="zukan-box"></div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    
    <script>
        function switchPage(pageId, buttonElement) {
            let pages = document.querySelectorAll('.page-area');
            pages.forEach(page => page.classList.remove('active'));
            let tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => tab.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            buttonElement.classList.add('active');
        }
    </script>
</body>
</html>
