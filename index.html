<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>はじめてのガチャゲーム</title>
    <style>
        /* 画面のデザインを整える部分（CSS） */
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding-top: 50px;
        }
        .container {
            background-color: white;
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            font-size: 18px;
            padding: 10px 30px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:active {
            background-color: #ff6b81;
        }
        #result {
            font-size: 24px;
            font-weight: bold;
            margin-top: 30px;
            min-height: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>単発ガチャ</h1>
        <p>SSRが出る確率は 3% だよ！</p>
        <p>SRが出る確率は 18% だよ！</p>
        <p>Rが出る確率は 79% だよ！</p>
        
        <button onclick="pullGacha()">ガチャを引く</button>
        
        <div id="result">？？？</div>
    </div>

    <script>
    // ガチャを引く関数（演出のコントロール）
    function pullGacha() {
        let resultDiv = document.getElementById("result");
        
        // 1. まずは「ドキドキ演出」を開始（文字を大きく、色を赤に）
        resultDiv.style.color = "#ff4757";
        resultDiv.style.fontSize = "36px";
        
        // 3秒間のカウントダウン演出
        resultDiv.innerText = "⏳ ３";
        
        setTimeout(() => {
            resultDiv.innerText = "⏳ ２";
        }, 700); // 0.7秒後に「2」にする

        setTimeout(() => {
            resultDiv.innerText = "⏳ １";
        }, 1400); // 1.4秒後に「1」にする

        setTimeout(() => {
            // 2. 2.1秒後に、実際の確率計算をして結果を表示する
            showFinalResult(resultDiv);
        }, 2100);
    }

    // 実際に確率を計算して結果を画面に出す関数
    function showFinalResult(resultDiv) {
        // 元の文字サイズに戻す
        resultDiv.style.fontSize = "24px";

        // 1から100までのランダムな数字を作る
        let randomNumber = Math.floor(Math.random() * 100) + 1;

        // 確率の判定
        if (randomNumber <= 3) {
            // 3%でSSR
            resultDiv.innerHTML = "<span style='color: #ffa500; font-size: 32px;'>✨SSR✨<br>3%</span>";
        } else if (randomNumber <= 21) {
            // 18%でSR
            resultDiv.innerHTML = "<span style='color: #9b59b6;'>⭐SR⭐<br>18%</span>";
        } else {
            // 79%でR
            resultDiv.innerHTML = "<span style='color: #555;'>R<br>79%</span>";
        }
    }
</script>

</body>
</html>
