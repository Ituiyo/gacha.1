<!DOCTYPE html>
<html>
<body>
<h1>ガチャゲーム</h1>

<button onclick="gacha()">ガチャを引く</button>

<p id="result"></p>

<script>
function gacha() {
  const r = Math.random();

  if (r < 0.01) {
    document.getElementById("result").innerText = "SSR";
  } else if (r < 0.1) {
    document.getElementById("result").innerText = "SR";
  } else {
    document.getElementById("result").innerText = "R";
  }
}
</script>

</body>
</html>
